<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経営・経済史文献横断検索</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .badge-jstage { background:#dbeafe; color:#1e40af; }
    .badge-cinii  { background:#dcfce7; color:#166534; }
    .badge-kiyou  { background:#fef3c7; color:#92400e; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

  <!-- Sticky header (after search) -->
  <header id="stickyHeader" class="hidden bg-white border-b shadow-sm sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="/" class="text-blue-700 font-bold text-sm whitespace-nowrap select-none">経営史検索</a>
      <div class="flex-1 flex rounded-full overflow-hidden border border-gray-300 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-200">
        <input id="headerInput" type="text" placeholder="キーワードを入力"
          class="flex-1 px-5 py-2 text-sm focus:outline-none bg-white">
        <button id="headerBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 text-sm font-medium transition-colors">
          検索
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <div id="heroSection" class="flex flex-col items-center justify-center min-h-screen px-4 pb-16">
    <p class="text-xs font-semibold tracking-widest text-blue-600 uppercase mb-3">Business &amp; Economic History</p>
    <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-3 text-center">経営・経済史文献横断検索</h1>
    <p class="text-gray-500 mb-8 text-center max-w-xl leading-relaxed text-sm">
      主要学術誌7誌 + 関西・関東の大学紀要 + CiNii広域検索を一括横断。<br>
      明治以降の地域産業史・企業家研究の比較レビューに。
    </p>
    <div class="w-full max-w-2xl flex rounded-full overflow-hidden border border-gray-200 shadow-lg focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100">
      <input id="heroInput" type="text" placeholder="キーワードを入力（例：繊維産業 大阪 明治）"
        class="flex-1 px-6 py-4 text-base focus:outline-none bg-white">
      <button id="heroBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 text-base font-medium transition-colors">
        検索
      </button>
    </div>
    <div id="heroTags" class="mt-8 flex flex-wrap gap-2 justify-center max-w-2xl"></div>
    <p class="mt-5 text-xs text-gray-400">J-STAGE公式API + CiNii Research API（NII）を使用</p>
  </div>

  <!-- Results -->
  <div id="resultsSection" class="hidden">
    <div class="max-w-6xl mx-auto px-4 py-6 flex gap-6 items-start">

      <!-- ── Sidebar ── -->
      <aside class="w-60 flex-shrink-0 space-y-3 sticky top-20">

        <!-- Main journals -->
        <div class="bg-white rounded-xl border p-4">
          <h3 class="font-semibold text-xs uppercase tracking-wide text-gray-400 mb-2">主要学術誌</h3>
          <div id="chkMain" class="space-y-1.5"></div>
          <div class="mt-2 pt-2 border-t flex gap-3">
            <button data-group="main" data-action="all"  class="grp-btn text-xs text-blue-600 hover:underline">全選択</button>
            <button data-group="main" data-action="none" class="grp-btn text-xs text-blue-600 hover:underline">全解除</button>
          </div>
        </div>

        <!-- Kansai kiyou -->
        <div class="bg-white rounded-xl border p-4">
          <h3 class="font-semibold text-xs uppercase tracking-wide text-gray-400 mb-2">大学紀要 — 関西圏</h3>
          <div id="chkKansai" class="space-y-1.5"></div>
          <div class="mt-2 pt-2 border-t flex gap-3">
            <button data-group="kansai" data-action="all"  class="grp-btn text-xs text-blue-600 hover:underline">全選択</button>
            <button data-group="kansai" data-action="none" class="grp-btn text-xs text-blue-600 hover:underline">全解除</button>
          </div>
        </div>

        <!-- Kanto kiyou -->
        <div class="bg-white rounded-xl border p-4">
          <h3 class="font-semibold text-xs uppercase tracking-wide text-gray-400 mb-2">大学紀要 — 関東圏</h3>
          <div id="chkKanto" class="space-y-1.5"></div>
          <div class="mt-2 pt-2 border-t flex gap-3">
            <button data-group="kanto" data-action="all"  class="grp-btn text-xs text-blue-600 hover:underline">全選択</button>
            <button data-group="kanto" data-action="none" class="grp-btn text-xs text-blue-600 hover:underline">全解除</button>
          </div>
        </div>

        <!-- CiNii broad -->
        <div class="bg-white rounded-xl border p-4">
          <h3 class="font-semibold text-xs uppercase tracking-wide text-gray-400 mb-2">広域検索</h3>
          <label class="flex items-start gap-2 cursor-pointer text-sm">
            <input type="checkbox" id="ciniiToggle" class="mt-0.5 rounded">
            <span>CiNii Research<br><span class="text-xs text-gray-400">紀要・学会誌の広域補完</span></span>
          </label>
        </div>

        <!-- Year / Sort -->
        <div class="bg-white rounded-xl border p-4 space-y-3">
          <div>
            <h3 class="font-semibold text-xs uppercase tracking-wide text-gray-400 mb-2">出版年</h3>
            <div class="flex items-center gap-1.5">
              <input id="yearFrom" type="number" value="1868" min="1868" max="2025"
                class="w-20 border border-gray-300 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500">
              <span class="text-gray-400">–</span>
              <input id="yearTo" type="number" value="2025" min="1868" max="2025"
                class="w-20 border border-gray-300 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500">
            </div>
          </div>
          <div>
            <h3 class="font-semibold text-xs uppercase tracking-wide text-gray-400 mb-2">並び順</h3>
            <select id="sortOrder"
              class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500">
              <option value="year_desc">新しい順</option>
              <option value="year_asc">古い順</option>
              <option value="journal">ジャーナル別</option>
            </select>
          </div>
        </div>

      </aside>

      <!-- ── Main ── -->
      <main class="flex-1 min-w-0">
        <div id="statusBar" class="text-sm text-gray-500 mb-4"></div>
        <div id="loadingSpinner" class="hidden py-20 text-center">
          <div class="inline-block w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
          <p class="text-gray-400 mt-3 text-sm">横断検索中…</p>
        </div>
        <div id="errorBanner" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 mb-4 text-sm text-red-700"></div>
        <div id="resultsList" class="space-y-3"></div>
      </main>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
